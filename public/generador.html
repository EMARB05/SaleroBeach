<!DOCTYPE html>
<html>
<head>
    <title>Generador de QRs - Salero Bar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1c23; color: white; }
        .qr-card { background: white; padding: 20px; display: inline-block; margin: 10px; border-radius: 10px; color: black; }
        button{padding: 10px; background: #d35400; color: white; border: none;}
        input{padding: 10px;}
        #contenedor-qr{margin-top: 30px;}

    </style>
</head>
<body>
    <h1>Generador de Mesas - Salero Bar</h1>
    <input type="number" id="numMesa" placeholder="Nº de Mesa">
    <button onclick="generarQR()">Generar QR</button>
    
    <div id="contenedor-qr"></div>

    <script>
        function generarQR() {
            const mesa = document.getElementById('numMesa').value;
            if(!mesa) return;

            const contenedor = document.getElementById('contenedor-qr');
            const div = document.createElement('div');
            div.className = 'qr-card';
            div.innerHTML = `<h3>MESA ${mesa}</h3><div id="canvas-${mesa}"></div>`;
            contenedor.appendChild(div);

            // Aquí creamos la URL con el parámetro ?mesa=X
            const urlMesa = `http://localhost:3000/index.html?mesa=${mesa}`;
            
            new QRCode(document.getElementById(`canvas-${mesa}`), {
                text: urlMesa,
                width: 150,
                height: 150
            });
        }
    </script>
</body>
</html>
