<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Salero Beach - Menú Cliente</title>
    <link rel="stylesheet" href="./css/cliente.css">
</head>

<body>
    <div class="mobile-container">
        <header class="hero-section">
            <div class="top-nav" style="justify-content: flex-end;"> 
    <div class="nav-icons">
        <div class="icon-cart-container" onclick="mostrarCarrito()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span id="cart-count" class="badge">0</span>
        </div>
    </div>
</div>
            <h1>Salero Beach</h1>
        </header>



        <section class="categories-section">
            <div class="section-header">
                <h2>Food Category</h2>
                <span class="arrow-more" onclick="verTodo('Food')">→</span>
            </div>
            <div id="cat-food" class="horizontal-scroll"></div>
        </section>

        <section class="categories-section">
            <div class="section-header">
                <h2>Drinks</h2>
                <span class="arrow-more" onclick="verTodo('Drinks')">→</span>
            </div>
            <div id="cat-drinks" class="horizontal-scroll"></div>
        </section>
        <section class="categories-section">
            <div class="section-header">
                <h2>Salads</h2>
                <span class="arrow-more" onclick="verTodo('Salads')">→</span>
            </div>
            <div id="cat-salads" class="horizontal-scroll"></div>
        </section>
        <section class="categories-section">
            <div class="section-header">
                <h2>Desserts</h2>
                <span class="arrow-more" onclick="verTodo('Desserts')">→</span>
            </div>
            <div id="cat-desserts" class="horizontal-scroll"></div>
        </section>

        <section class="categories-section">
            <div class="section-header">
                <h2>Winnes</h2>
                <span class="arrow-more" onclick="verTodo('Wines')">→</span>
            </div>
            <div id="cat-wines" class="horizontal-scroll"></div>
        </section>
    </div>

    <div id="modal-carrito" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Pedido 🛒</h2>
                <button onclick="cerrarCarrito()">X</button>
            </div>
            <div id="lista-pedido">
            </div>
            <div class="modal-footer">
                <div class="total-container">

                    <span id="precio-total">0.00€</span>
                </div>
                <button class="btn-confirmar" onclick="enviarABarra()">Confirmar y Pedir</button>
            </div>
        </div>
    </div>

    <div id="vista-categoria" class="pantalla-completa">
        <div class="header-iconos">
            <button class="btn-volver" onclick="cerrarVista()">←</button>
            <div class="iconos-derecha">
                <span class="icon-cart" onclick="mostrarCarrito()">🛒 0</span>
            </div>
        </div>

        <div class="search-container-detalle">
            <input type="text" class="buscador-detalle" placeholder="Search Food Here" oninput="filtrarEnDetalle()">
        </div>

        <h2 id="titulo-categoria">Categoría</h2>
        <div id="lista-detallada"></div>
    </div>
    <script src="./js/cliente.js"></script>

</body>

</html>
