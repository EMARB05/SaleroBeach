<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Salero Bar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="kitchen-view">
    <div class="container">
        <aside class="sidebar">
            <div class="logo">S</div>
            <nav>
                <ul>
                    <li class="active" onclick="mostrarSeccion('pedidos')">
                        <i class="fas fa-utensils"></i> COCINA
                    </li>
                    <li onclick="mostrarSeccion('historial')">
                        <i class="fas fa-history"></i> HISTORY
                    </li>
                    <li><i class="fas fa-box"></i> PRODUCTOS</li>
                </ul>
            </nav>
            <div class="status-container">
                <span class="status-dot"></span>
                <p>Cocina Online</p>
            </div>
        </aside>

        <main class="order-list">
            <header>
                <div class="header-top">
                    <h1 id="main-title">LISTA DE PEDIDOS</h1>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-avatar">C</span> 
                            <span class="user-name">Chef_Salero</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <i class="fas fa-bell notification-icon"></i>
                    </div>
                </div>

                <div class="order-tabs" id="tabs-cocina">
                    <span class="tab active">PENDIENTES</span>
                    <span class="tab">EN PREPARACIÓN</span>
                </div>
            </header>

            <section id="seccion-pedidos" class="cards-container">
                <article class="order-card">
                    <div class="card-header">
                        <h2>Mesa 3</h2>
                        <div class="alert-icon">5m</div>
                    </div>

                    <div class="product-list">
                        <div class="product-item">
                            <div class="details">
                                <h3>Chipi a la Plancha</h3>
                                <p class="note">SIN SAL</p>
                            </div>
                            <span class="qty">x2</span>
                        </div>
                    </div>
                    
                    <div class="total-items">
                        <hr class="separator">
                        <div class="info-footer">
                            <p class="qty-total">Comida pendiente</p>
                            <p>15:30</p>
                        </div>
                        <div class="card-buttons">
                            <button class="btn-check" onclick="completarPedido('id_ejemplo')">LISTO</button>
                            <button class="btn-cancel" onclick="cancelarPedido('id_ejemplo')">✖</button>
                        </div>
                    </div>
                </article>
            </section>

            <section id="seccion-historial" style="display: none;">
                <h2 style="margin-bottom: 20px;">Últimos Pedidos Finalizados</h2>
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Mesa</th>
                            <th>Pedido</th>
                            <th>Hora</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-historial-body">
                        </tbody>
                </table>
            </section>

        </main>
    </div>

    <script src="js/cocina.js"></script>
</body>

</html>
