<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra - Salero Bar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bar-view">
    <div class="container">
        <aside class="sidebar">
            <div class="logo">S</div>
            <nav>
                <ul>
                    <li class="active" onclick="mostrarHome()" id="btn-home"><i class="fas fa-utensils"></i> HOME</li>
                    <li onclick="mostrarHistorial()" id="btn-history"><i class="fas fa-history"></i> HISTORY</li>
                    <li onclick="mostrarGestionProductos()" id="btn-barra"><i
                            class="fas fa-glass-martini-alt"></i>PRODUCTS</li>
                </ul>
            </nav>
            <div class="status-container">
                <span class="status-dot"></span>
                <p>Restaurant Open</p>
            </div>
        </aside>

        <main class="order-list">
            <header>
                <div class="header-top">
                    <h1 id="main-title">POS - CONTROL DE CAJA</h1>
                    <div class="user-profile">
                        <div class="user-info" onclick="cerrarSesion()" style="cursor: pointer;">
                            <span class="user-avatar">B</span>
                            <span class="user-name">Staff_Barra</span>
                            <i class="fas fa-sign-out-alt"></i>
                        </div>
                        <i class="fas fa-bell notification-icon"></i>
                    </div>
                </div>

                <div class="order-tabs"></div>
            </header>

            <section class="cards-container">
            </section>
            <div id="history-view" style="display: none;">
                <div class="history-header">
                    <h2>ORDER HISTORY</h2>
                </div>
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Mesa</th>
                            <th>ID</th>
                            <th>Productos</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>

            <div id="products-view" style="display: none;">
                <div class="products-header">
                    <h2>GESTIÓN DE PRODUCTOS (STOCK)</h2>
                    <p>Desactiva los productos que se hayan agotado</p>
                </div>
                <div class="products-admin-grid" id="products-admin-list">
                </div>
            </div>
        </main>
    </div>

    <script src="./js/javascript.js"></script>
</body>

</html>
